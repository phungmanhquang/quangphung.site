[build]
publish = "dist"
command = "pnpm run build"

[build.environment]
NODE_VERSION = "22"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
from = "https://quangphung.dev/*"
to = "https://quangphung.site/:splat"
status = 302
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
